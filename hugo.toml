baseURL = "https://claudetoceo.com"
languageCode = "en-us"
title = "Claude to CEO"
theme = "PaperMod"
paginate = 10

[params]
  author = "Chris / HaxDogma"
  description = "A public record of building a path to CEO of Anthropic — through AI security research, safety education, and radical transparency."
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowFullTextinRSS = true
  defaultTheme = "dark"
  disableThemeToggle = false

  [params.homeInfoParams]
    Title = "This is not content. This is a record."
    Content = """
I'm Chris. I run [HaxDogma](https://youtube.com/@haxdogma) — a YouTube channel on AI security and safety.

I spent 15 years in enterprise defensive security: watching real adversaries work in production environments and writing detection logic to stop them. I've since turned that lens on AI systems.

**I'm publicly building a path to become CEO of Anthropic.**

Not a metaphor. Not a brand play. A 10-year plan, executed in the open, accountable to anyone watching.

My first finding: a small local language model followed injected attacker instructions **77.8% of the time**, with no resistance from position or phrasing. That's not a theoretical risk — that's a measured failure rate on a live model.

This site is where the work lives. Research findings, progress updates, and the full roadmap — documented as it happens.
"""

  [[params.socialIcons]]
    name = "youtube"
    url = "https://youtube.com/@haxdogma"

  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/haxdogma"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/haxdogma"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[menu]
  [[menu.main]]
    name = "Research"
    url = "/research/"
    weight = 1
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 2
  [[menu.main]]
    name = "Roadmap"
    url = "/roadmap/"
    weight = 3

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = true
  [markup.goldmark.renderer]
    unsafe = true
