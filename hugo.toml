baseURL = "https://claudetoceo.com"
languageCode = "en-us"
title = "Claude to CEO"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = false  # using static/robots.txt instead

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  author = "Chris / HaxDogma"
  description = "A public record of building a path to CEO of Anthropic — through AI security research, safety education, and radical transparency."
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowFullTextinRSS = true
  defaultTheme = "dark"
  disableThemeToggle = false

  [params.homeInfoParams]
    Title = "Claude took my job. Now I'm taking his."
    Content = """
I'm Chris. 32 years old. 15 years of IT experience and a burning, fiery, definitely-human passion for AI.

Then Claude came along and started doing parts of my job better than me.

Most people updated their LinkedIn. I had a different idea.

**I'm publicly building a path to become CEO of Anthropic** — the company that makes Claude.

Not as a stunt. A real 10-year plan, executed in the open, documented on this site, accountable to anyone watching.

**[The Declaration](https://youtube.com/@haxdogma) is live.** The first video — a public commitment, on record, no hedging. Watch it if you want to understand what this project actually is.

My first published research: a local language model followed injected attacker instructions in **77.8% of tests** — regardless of instruction position, phrasing, or task type. No trust boundary exists. That is a structural problem, not a prompt engineering one.

Latest: **[Contextual Alignment](/research/contextual-alignment/)** — a framework for keeping AI collaborators aligned with your intent across sessions, developed over 21 sessions building a 57,000-line game with Claude Code.

**[News Maxing](/news-maxing/)** — AI news through three lenses. Good faith, bad faith, and in between. Raw facts first, then you decide.

This site is the record. The research is real. The plan is documented. Follow the work.
"""

  [[params.socialIcons]]
    name = "youtube"
    url = "https://youtube.com/@haxdogma"

  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/haxdogma"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/haxdogma"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[menu]
  [[menu.main]]
    name = "Research"
    url = "/research/"
    weight = 1
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 2
  [[menu.main]]
    name = "Roadmap"
    url = "/roadmap/"
    weight = 3
  [[menu.main]]
    name = "GitHub"
    url = "/github/"
    weight = 4
  [[menu.main]]
    name = "News Maxing"
    url = "/news-maxing/"
    weight = 5

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = true
  [markup.goldmark.renderer]
    unsafe = true
