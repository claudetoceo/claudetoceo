baseURL = "https://claudetoceo.com"
languageCode = "en-us"
title = "Claude to CEO"
theme = "PaperMod"
paginate = 10

[params]
  author = "Chris / HaxDogma"
  description = "A public record of building a path to CEO of Anthropic — through AI security research, safety education, and radical transparency."
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowFullTextinRSS = true
  defaultTheme = "dark"
  disableThemeToggle = false

  [params.homeInfoParams]
    Title = "Claude took my job. Now I'm taking his."
    Content = """
I'm Chris. 32 years old. 15 years in enterprise defensive security — writing IPS rules to stop real attackers in production systems.

Then Claude came along and started doing parts of my job better than me.

Most people updated their LinkedIn. I had a different idea.

**I'm publicly building a path to become CEO of Anthropic** — the company that makes Claude.

Not rage. Not a bit. A real 10-year plan, executed in the open, documented on this site, accountable to anyone watching.

I'm using AI to research AI security, publishing the findings, building the credentials, and narrating every step. If I make it, you watched it happen. If I don't, you'll know exactly why.

My first finding: a local language model followed injected attacker instructions **77.8% of the time** — regardless of position, phrasing, or instruction type. The model has no trust hierarchy. That's a problem.

This is the record. Follow the work.
"""

  [[params.socialIcons]]
    name = "youtube"
    url = "https://youtube.com/@haxdogma"

  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/haxdogma"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/haxdogma"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[menu]
  [[menu.main]]
    name = "Research"
    url = "/research/"
    weight = 1
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 2
  [[menu.main]]
    name = "Roadmap"
